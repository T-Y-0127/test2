<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>沖縄 釣果・海況マップ</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --ocean-deep: #0a1628;
    --ocean-mid: #0d2240;
    --ocean-light: #163a5f;
    --ocean-surf: #1a5276;
    --teal: #00c9a7;
    --teal-dim: #00a389;
    --amber: #f5a623;
    --coral: #ff6b6b;
    --sky: #56ccf2;
    --text-primary: #e8f4f8;
    --text-secondary: #8ab4c8;
    --text-muted: #4a7a94;
    --border: rgba(0, 201, 167, 0.15);
    --border-bright: rgba(0, 201, 167, 0.4);
    --card-bg: rgba(5, 15, 30, 0.95);
    --panel-bg: rgba(5, 12, 25, 0.97);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--ocean-deep);
    color: var(--text-primary);
    height: 100vh;           /* fallback */
    height: 100dvh;          /* iOS Safari 15.4+ */
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  #header {
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border-bright);
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 12px;
    padding-top: max(8px, env(safe-area-inset-top));
    padding-left: max(12px, env(safe-area-inset-left));
    padding-right: max(12px, env(safe-area-inset-right));
    flex-shrink: 0;
    z-index: 1000;
  }
  #header-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  #header-row2 {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  #header h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--teal);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #header h1::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .layer-group {
    display: flex;
    background: var(--ocean-mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .layer-btn {
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .layer-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .layer-btn.active { background: var(--teal); color: var(--ocean-deep); font-weight: 700; }
  .layer-btn:hover:not(.active) { background: var(--ocean-light); color: var(--text-primary); }

  #layer-group { transition: opacity 0.2s; }
  #layer-group.disabled { opacity: 0.35; pointer-events: none; }

  #refresh-btn {
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    background: transparent;
    color: var(--teal);
    cursor: pointer;
    transition: all 0.2s;
  }
  #refresh-btn:hover { background: var(--teal); color: var(--ocean-deep); }

  /* ===== MAP ===== */
  #map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* Leaflet tile dark filter */
  /* 衛星写真タイルはフィルターなし */

  /* ===== WEATHER POPUP (Leaflet) ===== */
  .wx-popup {
    background: var(--card-bg);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 160px;
    -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
    font-family: 'Noto Sans JP', sans-serif;
  }
  .wx-popup .wx-name { font-size: 13px; font-weight: 700; color: var(--teal); margin-bottom: 8px; }
  .wx-popup .wx-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 12px; }
  .wx-popup .wx-key { color: var(--text-muted); }
  .wx-popup .wx-val { color: var(--text-primary); font-weight: 500; font-family: 'DM Mono', monospace; }
  .wx-popup .wx-wave { font-size: 18px; font-weight: 700; color: var(--sky); margin: 6px 0 2px; text-align: center; }
  .wx-popup .wx-wave-label { font-size: 10px; color: var(--text-muted); text-align: center; }

  /* Custom marker */
  .wx-label {
    background: rgba(5,12,25,0.82);
    border: 1px solid;
    border-radius: 8px;
    padding: 4px 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    color: var(--text-primary);
    white-space: nowrap;
    cursor: pointer;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    transition: transform 0.15s, background 0.15s;
    text-align: center;
    min-width: 64px;
  }
  .wx-label:hover { transform: scale(1.08); background: rgba(10,22,40,0.95); }
  .wx-label-top { display: flex; align-items: center; justify-content: center; gap: 3px; }
  .wx-label .m-name { font-weight: 700; color: var(--text-primary); font-size: 10px; }
  .wx-label .m-icon { font-size: 13px; }
  .wx-wind-row { display: flex; align-items: center; justify-content: center; gap: 3px; margin-top: 2px; }
  .wind-arrow { width: 12px; height: 12px; flex-shrink: 0; }
  .m-wind { font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500; }

  /* ポップアップ内コンパス */
  .wx-wind-block { display: flex; align-items: center; gap: 10px; margin: 8px 0 4px; }
  .wind-compass { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .compass-ring {
    position: relative; width: 40px; height: 40px;
    border: 1px solid rgba(255,255,255,0.2); border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .compass-n,.compass-s,.compass-e,.compass-w {
    position: absolute; font-size: 8px; color: var(--text-muted);
    line-height: 1;
  }
  .compass-n { top: 1px; left: 50%; transform: translateX(-50%); }
  .compass-s { bottom: 1px; left: 50%; transform: translateX(-50%); }
  .compass-e { right: 1px; top: 50%; transform: translateY(-50%); }
  .compass-w { left: 1px; top: 50%; transform: translateY(-50%); }
  .compass-label { font-size: 10px; font-weight: 700; }
  .wind-detail { flex: 1; }
  .wind-speed { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1.2; }
  .wind-badge {
    display: inline-block; font-size: 10px; padding: 1px 6px;
    border-radius: 4px; margin-top: 3px;
  }
  .wx-divider { border-top: 1px solid rgba(255,255,255,0.08); margin: 8px 0; }

  /* ===== HEATMAP CANVAS ===== */
  #heatmap-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 400;
    display: block;   /* JS で制御 */
  }

  /* ===== LEGEND ===== */
  #legend {
    position: absolute;
    bottom: 40px; right: 8px;
    z-index: 800;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
  }
  #legend-pin .leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: var(--text-secondary); }
  #legend-pin .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  #legend-heat { display: none; }
  #legend-heat .grad-bar { width: 100px; height: 8px; border-radius: 4px; background: linear-gradient(to right,#00c9a7,#f5a623,#ff6b6b); margin: 4px 0; }
  #legend-heat .grad-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); }

  /* ===== STATUS BAR ===== */
  #status {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    z-index: 900;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    color: var(--text-secondary);
    pointer-events: none;
    transition: opacity 0.4s;
  }

  /* ===== CLICK HINT ===== */
  #click-hint {
    position: absolute;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 800;
    background: rgba(0,0,0,0.6);
    color: var(--text-secondary);
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 20px;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ===== PHOTO PIN MARKER ===== */
  .photo-marker {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #534AB7;
    border: 2.5px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(83,74,183,0.5);
    font-family: 'Noto Sans JP', sans-serif;
    transition: transform 0.15s;
  }
  .photo-marker:hover { transform: scale(1.15); }

  /* ===== MODAL ===== */
  #modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 10000;
    align-items: center;
    justify-content: center;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #modal-overlay.show { display: flex; }

  #modal {
    background: var(--panel-bg);
    border: 1px solid var(--border-bright);
    border-radius: 16px;
    padding: 16px;
    width: min(400px, 96vw);
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }

  #modal h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 4px;
  }

  #modal .modal-coord {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 16px;
  }

  #modal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .modal-thumb {
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s;
    width: 100%;
  }
  .modal-thumb:hover { transform: scale(1.03); }

  .modal-add {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 1.5px dashed var(--border-bright);
    background: var(--ocean-mid);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--teal);
    font-size: 22px;
    transition: background 0.15s;
  }
  .modal-add span { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: 'Noto Sans JP', sans-serif; }
  .modal-add:hover { background: var(--ocean-light); }

  .modal-uploading { color: var(--text-muted); font-size: 11px; text-align: center; padding: 8px 0; }

  #modal-caption-input {
    width: 100%;
    background: var(--ocean-mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    margin-bottom: 12px;
    outline: none;
    resize: none;
  }
  #modal-caption-input:focus { border-color: var(--teal); }
  #modal-caption-input::placeholder { color: var(--text-muted); }

  .modal-caption-existing {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    padding: 8px 12px;
    background: var(--ocean-mid);
    border-radius: 8px;
    border-left: 3px solid var(--teal);
  }

  #modal-close {
    width: 100%;
    padding: 9px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #modal-close:hover { background: var(--ocean-light); color: var(--text-primary); }

  #modal-delete {
    width: 100%;
    padding: 9px;
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 8px;
    background: transparent;
    color: var(--coral);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.2s;
  }
  #modal-delete:hover { background: rgba(255,107,107,0.1); }

  #file-input { display: none; }

  /* ===== LIGHTBOX ===== */
  #lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    z-index: 20000;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  #lightbox.show { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  /* setup-overlay CSS 削除済み */
</style>
</head>
<body>

<!-- setup-overlay 削除済み: デモモードで自動起動 -->

<!-- ===== HEADER ===== -->
<div id="header">
  <!-- 1行目: タイトル + 更新 -->
  <div id="header-row1">
    <h1>沖縄 釣果・海況マップ</h1>
    <button id="refresh-btn" onclick="fetchWeather()">↺ 更新</button>
  </div>
  <!-- 2行目: コントロール群（折り返し対応） -->

  <div id="status">データ読み込み中...</div>

      <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px">雨雲レーダー</div>
      <div class="leg-row"><div class="leg-dot" style="background:rgba(50,220,120,0.8)"></div>弱雨</div>
      <div class="leg-row"><div class="leg-dot" style="background:rgba(255,160,0,0.85)"></div>強雨</div>
      <div class="leg-row"><div class="leg-dot" style="background:rgba(255,60,20,0.9)"></div>激しい雨</div>
      <div style="border-top:0.5px solid var(--border);margin:6px 0 5px"></div>

  </div>

<!-- ===== PHOTO MODAL ===== -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">写真スポット</h2>
    <div class="modal-coord" id="modal-coord"></div>
    <div id="modal-grid"></div>
    <input type="file" id="file-input" accept="image/*" multiple>

<!-- ===== LIGHTBOX ===== -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<!-- ライブラリを body 末尾で同期読み込み（Safari defer 問題回避） -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
// ======================================================
// CONFIG & STATE
// ======================================================
let supabase = null;
let useSupabase = false;
let map = null;
let currentLayer = 'pin';
let overlayVisible = true;   // 天気・雨雲オーバーレイ表示フラグ
let windVisible      = false; // 風矢印表示フラグ（デフォルトOFF）
let forecastOffset   = 0;     // 0=現在 1=+1h 2=+2h 3=+3h 6=+6h 12=+12h 24=+24h
let wxMarkersVisible = true; // ラベルピン表示フラグ
let wxMarkers = [];
let photoPins = [];   // {id, lat, lng, caption, photos:[], marker}
let activePinIdx = null;

const OKINAWA_CENTER = [26.5, 127.8];
const OKINAWA_ZOOM = 8;

// ============================================================
// 沖縄本島 海岸線ポリゴン（簡略版・経度,緯度の順）
// point-in-polygon で陸地判定に使用
// ============================================================
const OKINAWA_POLY = [
  [127.642,26.090],[127.630,26.120],[127.637,26.155],[127.657,26.175],
  [127.661,26.210],[127.648,26.230],[127.648,26.260],[127.668,26.280],
  [127.718,26.300],[127.726,26.320],[127.726,26.350],[127.726,26.380],
  [127.718,26.400],[127.710,26.430],[127.730,26.460],[127.755,26.480],
  [127.778,26.510],[127.790,26.540],[127.820,26.560],[127.860,26.580],
  [127.900,26.590],[127.940,26.595],[127.970,26.600],[127.995,26.620],
  [127.930,26.640],[127.890,26.660],[127.860,26.680],[127.870,26.700],
  [127.900,26.720],[128.000,26.730],[128.060,26.750],[128.130,26.760],
  [128.180,26.800],[128.230,26.840],[128.255,26.870],[128.290,26.840],
  [128.310,26.800],[128.290,26.760],[128.260,26.730],[128.230,26.710],
  [128.200,26.680],[128.180,26.650],[128.160,26.610],[128.140,26.580],
  [128.120,26.550],[128.100,26.510],[128.060,26.480],[128.030,26.450],
  [128.010,26.420],[127.990,26.400],[128.010,26.370],[128.030,26.350],
  [128.010,26.320],[127.980,26.300],[127.940,26.280],[127.900,26.270],
  [127.870,26.260],[127.840,26.240],[127.820,26.220],[127.810,26.200],
  [127.790,26.180],[127.770,26.160],[127.750,26.140],[127.720,26.110],
  [127.690,26.095],[127.660,26.090],[127.642,26.090],
];

// Ray casting 法: [lng, lat] がポリゴン内なら true（= 陸地）
function isOnLand(lng, lat) {
  const poly = OKINAWA_POLY;
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][0], yi = poly[i][1];
    const xj = poly[j][0], yj = poly[j][1];
    if (((yi > lat) !== (yj > lat)) &&
        (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// 観測地点（沖縄本島の主要漁港）
// 出典: 農林水産省漁港台帳・国土交通省・OSM

function startApp() {
  if (typeof L === 'undefined') {
    setTimeout(startApp, 100);
    return;
  }
  if (map) return; // 二重初期化防止
  initMap();
  fetchWeather();
  if (useSupabase) loadPhotoPins();
}

// ======================================================
// MAP INIT
// ======================================================
function initMap() {
  // 沖縄本島全域に表示範囲を限定
  const BOUNDS = L.latLngBounds(
    L.latLng(25.90, 127.55),   // 南西
    L.latLng(26.95, 128.40)    // 北東
  );

  map = L.map('map', {
    zoomControl: true,
    attributionControl: true,
    maxBounds: BOUNDS,
    maxBoundsViscosity: 1.0,
    minZoom: 10,
    maxZoom: 19,
  });
  map.setView([26.212, 127.681], 13);  // 那覇市中心・拡大表示

  // 衛星写真ベース (Esri World Imagery)
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics',
    maxZoom: 19,
  }).addTo(map);

  // 地名・道路ラベルを上乗せ (Esri Reference Overlay)
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    attribution: '',
    maxZoom: 19,
    opacity: 0.7,
  }).addTo(map);

  map.on('click', onMapClick);
  map.on('zoomend moveend', () => {
    if (overlayVisible) drawOverlay();
  });
}

// ======================================================
// WEATHER FETCH  (Open-Meteo + Marine API)
// ======================================================
async function fetchWeather() {
  setStatus('気象データ取得中...');
  // allSettled で1地点失敗しても他の地点は表示する
  const results = await Promise.allSettled(STATIONS.map(fetchStation));
  clearWxMarkers();
  let successCount = 0;
  results.forEach((r, i) => {
    if (r.status === 'fulfilled' && r.value) {
      addWxMarker(STATIONS[i], r.value);
      successCount++;
    }
  });
  // マーカー追加後、必ず再描画（データがある・なし問わず）
  drawOverlay();
  if (successCount > 0) {
    setStatus(`最終更新: ${new Date().toLocaleTimeString('ja-JP')} (${successCount}/${STATIONS.length}地点)`, 4000);
  } else {
    setStatus('データ取得失敗 — ネットワーク接続を確認してください', 6000);
  }
}

async function fetchStation(st) {
  const safeJson = url => fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);

  const [wx, marine] = await Promise.all([
    safeJson(`https://api.open-meteo.com/v1/forecast?latitude=${st.lat}&longitude=${st.lng}`
      + `&current=temperature_2m,windspeed_10m,winddirection_10m,weathercode`
      + `&hourly=weathercode,windspeed_10m,winddirection_10m`
      + `&wind_speed_unit=ms&timezone=Asia%2FTokyo&forecast_days=2`),
    safeJson(`https://marine-api.open-meteo.com/v1/marine?latitude=${st.lat}&longitude=${st.lng}&current=wave_height,wave_period,wave_direction&timezone=Asia%2FTokyo`),
  ]);

  if (!wx || !wx.current) return null;

  // 現在時刻に最も近いhourlyインデックスを特定
  const now = new Date();
  const nowISO = now.toISOString().slice(0, 13); // "2024-07-01T14"
  const times = wx.hourly?.time ?? [];
  // hourly.time は "2024-07-01T14:00" 形式
  let baseIdx = times.findIndex(t => t.startsWith(nowISO));
  if (baseIdx < 0) baseIdx = 0;

  // 現在〜+24h の weathercode / wind を必要なオフセット分保持
  const OFFSETS = [0, 1, 2, 3, 6, 12, 24];
  const forecast = {};
  for (const offset of OFFSETS) {
    const idx = baseIdx + offset;
    forecast[offset] = {
      wcode:   wx.hourly?.weathercode?.[idx]       ?? wx.current.weathercode      ?? 0,
      wind:    wx.hourly?.windspeed_10m?.[idx]      ?? wx.current.windspeed_10m    ?? null,
      winddir: wx.hourly?.winddirection_10m?.[idx]  ?? wx.current.winddirection_10m ?? null,
    };
  }

  return {
    temp:       wx.current.temperature_2m        ?? null,
    wind:       wx.current.windspeed_10m         ?? null,
    winddir:    wx.current.winddirection_10m     ?? null,
    wcode:      wx.current.weathercode           ?? 0,
    forecast,   // {0:現在, 1:+1h, 2:+2h, 3:+3h, 6:+6h, 12:+12h, 24:+24h}
    wave:       marine?.current?.wave_height     ?? null,
    wavePeriod: marine?.current?.wave_period     ?? null,
    waveDir:    marine?.current?.wave_direction  ?? null,
  };
}

function weatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 2)  return '⛅';
  if (code <= 45) return '🌫️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '🌨️';
  if (code <= 82) return '🌦️';
  return '⛈️';
}

function weatherColor(code) {
  if (code === 0)  return '#1D9E75';
  if (code <= 2)   return '#185FA5';
  if (code <= 67)  return '#f5a623';
  return '#ff6b6b';
}

// 風向（度）→ 16方位テキスト
function windDirText(deg) {
  if (deg == null) return '--';
  const dirs = ['北','北北東','北東','東北東','東','東南東','南東','南南東',
                 '南','南南西','南西','西南西','西','西北西','北西','北北西'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// 風向（度）→ CSS rotate角度（矢印が「吹いてくる方向」を向く）
function windArrowDeg(deg) {
  if (deg == null) return 0;
  return (deg + 180) % 360;  // 気象風向は「吹いてくる方向」なので180°反転
}

// 風速(m/s) → ボーフォートスケール色
function windColor(speed) {
  if (speed == null) return '#8ab4c8';
  if (speed <  3)  return '#56ccf2';   // 微風: 水色
  if (speed <  7)  return '#00c9a7';   // 軟風: 緑
  if (speed < 11)  return '#f5a623';   // やや強い風: 橙
  if (speed < 17)  return '#ff6b6b';   // 強風: 赤
  return '#cc44ff';                     // 暴風: 紫
}

// 風速ラベル
function windLabel(speed) {
  if (speed == null) return '--';
  if (speed <  3)  return '微風';
  if (speed <  7)  return '軟風';
  if (speed < 11)  return '強め';
  if (speed < 17)  return '強風';
  return '暴風';
}

// WEATHER MARKERS
// ======================================================
function clearWxMarkers() {
  wxMarkers.forEach(m => map.removeLayer(m));
  wxMarkers = [];
}

function addWxMarker(st, d) {
  const icon_str = weatherIcon(d.wcode);
  const color    = weatherColor(d.wcode);
  const waveStr  = d.wave != null ? d.wave.toFixed(1)+'m' : '--';
  const windStr  = d.wind != null ? d.wind.toFixed(1)+'m/s' : '--';
  const tempStr  = d.temp != null ? Math.round(d.temp)+'℃' : '--';

  // 雨雲レーダー表示時はオーバーレイが主役 → ラベル+風向矢印ピン
  const wColor  = windColor(d.wind);
  const arrowDeg = windArrowDeg(d.winddir);
  const windSpeedStr = d.wind != null ? d.wind.toFixed(1) : '--';
  const html = `<div class="wx-label" style="border-color:${color}">
    <div class="wx-label-top">
      <span class="m-icon">${icon_str}</span>
      <span class="m-name">${st.name}</span>
    </div>
    <div class="wx-wind-row">
      <svg class="wind-arrow" viewBox="0 0 16 16" style="transform:rotate(${arrowDeg}deg)">
        <polygon points="8,1 12,13 8,10 4,13" fill="${wColor}"/>
      </svg>
      <span class="m-wind" style="color:${wColor}">${windSpeedStr}m/s</span>
    </div>
  </div>`;

  const marker = L.marker([st.lat, st.lng], {
    icon: L.divIcon({ html, className:'', iconSize:null, iconAnchor:[40,20] }),
    zIndexOffset: 500,
  }).addTo(map);

  const wc      = windColor(d.wind);
  const wLabel  = windLabel(d.wind);
  const wDirTxt = windDirText(d.winddir);
  const wArrow  = windArrowDeg(d.winddir);
  const compassRot = d.winddir != null ? d.winddir : 0;

  // 予報テーブル行を生成
  const fcDefs = [{k:0,label:'現在'},{k:1,label:'+1h'},{k:2,label:'+2h'},{k:3,label:'+3h'},{k:6,label:'+6h'},{k:12,label:'+12h'},{k:24,label:'+24h'}];
  const fcRows = fcDefs.map(({k, label}) => {
    const fc = (d.forecast || {})[k];
    if (!fc) return '';
    const fIcon = weatherIcon(fc.wcode);
    const fWind = fc.wind != null ? fc.wind.toFixed(1)+'m/s' : '--';
    const active = k === forecastOffset ? 'style="background:rgba(0,201,167,0.15);border-radius:4px"' : '';
    return `<tr ${active}>
      <td style="padding:2px 6px;color:var(--text-muted);font-size:11px">${label}</td>
      <td style="padding:2px 4px;font-size:13px">${fIcon}</td>
      <td style="padding:2px 6px;font-size:11px;color:var(--sky)">${fWind}</td>
    </tr>`;
  }).join('');

  const popupHtml = `<div class="wx-popup">
    <div class="wx-name">${icon_str} ${st.name}</div>

    <div class="wx-row"><span class="wx-key">気温</span><span class="wx-val">${tempStr}</span></div>

    <div class="wx-wind-block">
      <div class="wind-compass">
        <div class="compass-ring">
          <span class="compass-n">N</span>
          <span class="compass-s">S</span>
          <span class="compass-e">E</span>
          <span class="compass-w">W</span>
          <svg viewBox="0 0 40 40" width="40" height="40" style="position:absolute;top:0;left:0">
            <polygon points="20,4 24,28 20,24 16,28"
              fill="${wc}"
              transform="rotate(${wArrow},20,20)"/>
          </svg>
        </div>
        <div class="compass-label" style="color:${wc}">${wDirTxt}</div>
      </div>
      <div class="wind-detail">
        <div class="wind-speed" style="color:${wc}">${windStr}</div>
        <div class="wind-badge" style="background:${wc}22;color:${wc};border:1px solid ${wc}55">${wLabel}</div>
        <div class="wx-row" style="margin-top:6px"><span class="wx-key">風向角</span><span class="wx-val">${d.winddir!=null?Math.round(d.winddir)+'°':'--'}</span></div>
      </div>
    </div>

    <div class="wx-divider"></div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">雨雲予報</div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:6px">${fcRows}</table>
    <div class="wx-divider"></div>
    <div class="wx-wave">${waveStr}</div>
    <div class="wx-wave-label">波高</div>
    <div class="wx-row" style="margin-top:4px"><span class="wx-key">波周期</span><span class="wx-val">${d.wavePeriod!=null?d.wavePeriod.toFixed(1)+'s':'--'}</span></div>
    <div class="wx-row"><span class="wx-key">波向</span><span class="wx-val">${d.waveDir!=null?windDirText(d.waveDir)+' ('+Math.round(d.waveDir)+'°)':'--'}</span></div>
  </div>`;

  marker.bindPopup(L.popup({ className:'wx-popup-wrap', closeButton:true, maxWidth:200 }).setContent(popupHtml));
  marker._wxData = { st, d };
  wxMarkers.push(marker);
}

function toggleWind() {
  windVisible = !windVisible;
  const btn = document.getElementById('btn-wind');
  btn.classList.toggle('active', windVisible);
  btn.textContent = windVisible ? '風向き ON' : '風向き OFF';
  drawOverlay();
}

function setForecast(offset) {
  forecastOffset = offset;
  // ボタン active 切り替え（全オフセット対象）
  [0,1,2,3,6,12,24].forEach(i => {
    const b = document.getElementById(`fc-${i}`);
    if (b) b.classList.toggle('active', i === offset);
  });
  if (!overlayVisible) return;
  drawOverlay();
}

function toggleOverlay() {
  overlayVisible = !overlayVisible;
  wxMarkersVisible = overlayVisible;
  const btn = document.getElementById('btn-overlay');
  const canvas = document.getElementById('heatmap-canvas');

  const lg = document.getElementById('layer-group');
  const fg = document.getElementById('forecast-group');
  if (overlayVisible) {
    btn.classList.add('active');
    btn.textContent = '気象 ON';
    canvas.style.display = '';
    lg.classList.remove('disabled');
    fg.classList.remove('disabled');
    wxMarkers.forEach(m => m.getElement() && (m.getElement().style.display = ''));
    drawOverlay();
  } else {
    btn.classList.remove('active');
    btn.textContent = '気象 OFF';
    canvas.style.display = 'none';
    lg.classList.add('disabled');
    fg.classList.add('disabled');
    // Leafletマーカー要素はgetElement()が遅延する場合があるためセーフガード
    wxMarkers.forEach(m => {
      const el = m.getElement();
      if (el) el.style.display = 'none';
    });
  }
}

// 天気コードから雨雲レーダー風の色を返す
// 快晴・晴れ(wcode<=2) は null → ブロックを塗らず衛星写真を透かす
function radarColor(wcode) {
  if (wcode <= 45)               return null;                             // 快晴・晴れ・霧: 非表示
  if (wcode <= 55)               return { r: 50, g:220, b:120, a:0.65 }; // 弱雨: 緑
  if (wcode <= 65)               return { r:200, g:230, b:  0, a:0.72 }; // 中雨: 黄緑
  if (wcode <= 75)               return { r:255, g:160, b:  0, a:0.80 }; // 強雨: 橙
  if (wcode <= 82)               return { r:255, g: 60, b: 20, a:0.87 }; // 激しい雨: 赤
  return                                { r:200, g:  0, b:200, a:0.90 }; // 雷雨: 紫
}

function drawOverlay() {
  const canvas = document.getElementById('heatmap-canvas');
  if (!overlayVisible) { canvas.style.display = 'none'; return; }
  canvas.style.display = 'block';
  const wrap = document.getElementById('map-wrap');
  const rect = wrap.getBoundingClientRect();
  const W = Math.round(rect.width  || wrap.offsetWidth  || 800);
  const H = Math.round(rect.height || wrap.offsetHeight || 600);
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  if (wxMarkers.length === 0) return;

  // ---- ブロックサイズ: ズームに応じて調整 ----
  const zoom = map.getZoom();
  const CELL = Math.max(4, Math.round(160 / zoom));  // zoom13→12px, zoom15→10px, zoom16→10px

  // ---- 各マーカーのキャンバス座標を事前計算 ----
  const pts = wxMarkers.map(m => {
    const { st, d } = m._wxData;
    const p = map.latLngToContainerPoint([st.lat, st.lng]);
    return { px: p.x, py: p.y, st, d };
  });

  if (currentLayer === 'pin') {
    // ========== 雨雲レーダー: ブロック塗り ==========
    for (let cy = 0; cy < H; cy += CELL) {
      for (let cx = 0; cx < W; cx += CELL) {
        const mx = cx + CELL / 2;
        const my = cy + CELL / 2;
        // 最近傍ステーションを探す
        let best = null, bestD2 = Infinity;
        for (const p of pts) {
          const dx = mx - p.px, dy = my - p.py;
          const d2 = dx*dx + dy*dy;
          if (d2 < bestD2) { bestD2 = d2; best = p; }
        }
        if (!best) continue;
        // 予報オフセットに応じたwcodeを取得
        const fc = best.d.forecast?.[forecastOffset] ?? best.d.forecast?.[0];
        const wcode = fc?.wcode ?? best.d.wcode ?? 0;
        const c = radarColor(wcode);
        if (!c) continue;
        ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${c.a})`;
        ctx.fillRect(cx, cy, CELL, CELL);
      }
    }

    // ---- 風向き矢印: 地図全体をグリッド分割して均等配置 ----
    if (windVisible) {
      const allWindPts = pts.filter(p => p.d.wind != null && p.d.winddir != null);

      // 風速(m/s) → 色
      function windSpeedColor(spd) {
        if (spd <  1)  return 'rgba(180,180,180,0.90)'; // グレー
        if (spd <  3)  return 'rgba(130,220,255,0.93)'; // 水色
        if (spd <  5)  return 'rgba( 40,130,255,0.95)'; // 青
        if (spd < 10)  return 'rgba(255,220,  0,0.95)'; // 黄
        if (spd < 15)  return 'rgba(255,140,  0,0.97)'; // 橙
        return               'rgba(255, 50, 50,0.97)'; // 赤
      }

      // 矢印描画関数
      function drawWindArrow(cx, cy, winddir, spd, len) {
        const angle = (winddir + 180 - 90) * Math.PI / 180;
        const x2 = cx + Math.cos(angle) * len;
        const y2 = cy + Math.sin(angle) * len;
        const color = windSpeedColor(spd);
        const aw = 0.42;
        const al = Math.max(5, len * 0.32);
        ctx.save();
        ctx.lineCap = 'round';
        // 黒縁
        ctx.strokeStyle = 'rgba(0,0,0,0.65)';
        ctx.lineWidth   = 3.5;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - al*Math.cos(angle-aw), y2 - al*Math.sin(angle-aw));
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - al*Math.cos(angle+aw), y2 - al*Math.sin(angle+aw));
        ctx.stroke();
        // 本体
        ctx.strokeStyle = color;
        ctx.lineWidth   = 2;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - al*Math.cos(angle-aw), y2 - al*Math.sin(angle-aw));
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - al*Math.cos(angle+aw), y2 - al*Math.sin(angle+aw));
        ctx.stroke();
        // 起点の丸
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }

      // ズームが上がるほど間隔を詰める（拡大時に細かく表示）
      const ICON_STEP = Math.max(10, Math.round(460 / zoom));
      const ARROW_LEN = Math.min(28, Math.max(10, Math.round(ICON_STEP * 0.58)));

      for (let gy = ICON_STEP / 2; gy < H; gy += ICON_STEP) {
        for (let gx = ICON_STEP / 2; gx < W; gx += ICON_STEP) {
          // 最近傍の観測点（全地点対象・距離制限なし）
          let best = null, bestD2 = Infinity;
          for (const p of allWindPts) {
            const dx = gx - p.px, dy = gy - p.py;
            const d2 = dx*dx + dy*dy;
            if (d2 < bestD2) { bestD2 = d2; best = p; }
          }
          if (!best) continue;
          // 陸地判定: このグリッドセルの地理座標がポリゴン内なら描画しない
          const cellLatLng = map.containerPointToLatLng([gx, gy]);
          if (isOnLand(cellLatLng.lng, cellLatLng.lat)) continue;
          const fcWind = best.d.forecast?.[forecastOffset] ?? best.d.forecast?.[0];
          const wdir = fcWind?.winddir ?? best.d.winddir;
          const wspd = fcWind?.wind    ?? best.d.wind;
          if (wdir == null || wspd == null) continue;
          drawWindArrow(gx, gy, wdir, wspd, ARROW_LEN);
        }
      }
    } // end if windVisible

  }
}

// ======================================================
// MAP CLICK → NEW PIN
// ======================================================
function onMapClick(e) {
  const { lat, lng } = e.latlng;
  const newPin = { id: null, lat, lng, caption: '', photos: [], marker: null };
  photoPins.push(newPin);
  const idx = photoPins.length - 1;
  addPhotoMarker(idx);
  openModal(idx);
}

// ======================================================
// PHOTO PINS
// ======================================================
function addPhotoMarker(idx) {
  const p = photoPins[idx];
  if (p.marker) map.removeLayer(p.marker);

  const count = p.photos.length;
  const html  = `<div class="photo-marker">${count > 0 ? count : '+'}</div>`;
  const marker = L.marker([p.lat, p.lng], {
    icon: L.divIcon({ html, className:'', iconSize:[30,30], iconAnchor:[15,15] }),
    zIndexOffset: 1000,
  }).addTo(map);
  marker.on('click', e => { e.originalEvent.stopPropagation(); openModal(idx); });
  p.marker = marker;
}

async function loadPhotoPins() {
  if (!useSupabase) return;
  setStatus('写真スポット読み込み中...');
  try {
    const { data, error } = await supabase.from('photo_pins').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    data.forEach(row => {
      const pin = { id: row.id, lat: row.lat, lng: row.lng, caption: row.caption||'', photos: row.photos||[], marker: null };
      photoPins.push(pin);
      addPhotoMarker(photoPins.length - 1);
    });
    setStatus(`写真スポット ${data.length} 件読み込み`, 3000);
  } catch(e) {
    setStatus('写真読み込みエラー: ' + e.message, 4000);
  }
}

// ======================================================
// MODAL
// ======================================================
function openModal(idx) {
  activePinIdx = idx;
  const p = photoPins[idx];
  document.getElementById('modal-title').textContent = p.id ? `スポット` : '新しいスポット';
  document.getElementById('modal-coord').textContent = `📍 ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}`;
  document.getElementById('modal-delete').style.display = p.id ? '' : 'none';
  renderModalGrid();
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  // 写真が1枚もない新規スポット（id未採番）は閉じたときにピンごと削除
  if (activePinIdx !== null) {
    const p = photoPins[activePinIdx];
    if (!p.id && p.photos.length === 0) {
      if (p.marker) map.removeLayer(p.marker);
      photoPins.splice(activePinIdx, 1);
    }
  }
  document.getElementById('modal-overlay').classList.remove('show');
  activePinIdx = null;
}

function renderModalGrid() {
  const p   = photoPins[activePinIdx];
  const grid = document.getElementById('modal-grid');
  grid.innerHTML = '';

  // caption
  if (p.caption) {
    const div = document.createElement('div');
    div.className = 'modal-caption-existing';
    div.style.gridColumn = '1 / -1';
    div.textContent = p.caption;
    grid.appendChild(div);
  }

  // photos
  p.photos.forEach(url => {
    const img = document.createElement('img');
    img.className = 'modal-thumb';
    img.src = url;
    img.onclick = () => openLightbox(url);
    grid.appendChild(img);
  });

  // add button
  if (p.photos.length < 9) {
    const addDiv = document.createElement('div');
    addDiv.className = 'modal-add';
    addDiv.innerHTML = `+<span>写真追加</span>`;
    addDiv.onclick = () => document.getElementById('file-input').click();
    grid.appendChild(addDiv);

    // caption input (only if no caption yet)
    if (!p.caption) {
      const ta = document.createElement('textarea');
      ta.id = 'modal-caption-input';
      ta.rows = 2;
      ta.placeholder = 'コメントを入力（任意）';
      ta.style.gridColumn = '1 / -1';
      grid.insertBefore(ta, grid.firstChild);
    }
  }
}

// ======================================================
// FILE UPLOAD
// ======================================================
document.getElementById('file-input').addEventListener('change', async function() {
  const files = Array.from(this.files);
  if (!files.length) return;
  this.value = '';

  const p = photoPins[activePinIdx];
  const captionEl = document.getElementById('modal-caption-input');
  const caption   = captionEl ? captionEl.value.trim() : p.caption;

  const grid = document.getElementById('modal-grid');
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'modal-uploading';
  loadingDiv.textContent = 'アップロード中...';
  loadingDiv.style.gridColumn = '1 / -1';
  grid.appendChild(loadingDiv);

  try {
    const urls = await Promise.all(files.map(f => uploadFile(f)));
    p.photos.push(...urls);
    p.caption = caption;

    if (useSupabase) {
      await savePinToSupabase(activePinIdx);
    }
    addPhotoMarker(activePinIdx);
    renderModalGrid();
  } catch(e) {
    loadingDiv.textContent = 'エラー: ' + e.message;
  }
});

async function uploadFile(file) {
  if (!useSupabase) {
    // demo: base64
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = () => rej(new Error('読み込み失敗'));
      r.readAsDataURL(file);
    });
  }
  const path  = `photos/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  const { error } = await supabase.storage.from('okinawa-map').upload(path, file);
  if (error) throw error;
  const { data } = supabase.storage.from('okinawa-map').getPublicUrl(path);
  return data.publicUrl;
}

async function savePinToSupabase(idx) {
  const p = photoPins[idx];
  if (p.id) {
    const { error } = await supabase.from('photo_pins').update({ photos: p.photos, caption: p.caption }).eq('id', p.id);
    if (error) throw error;
  } else {
    const { data, error } = await supabase.from('photo_pins').insert({ lat: p.lat, lng: p.lng, photos: p.photos, caption: p.caption }).select().single();
    if (error) throw error;
    p.id = data.id;
  }
}

async function deletePin() {
  if (!confirm('このスポットを削除しますか？')) return;
  const p = photoPins[activePinIdx];
  if (useSupabase && p.id) {
    await supabase.from('photo_pins').delete().eq('id', p.id);
  }
  map.removeLayer(p.marker);
  photoPins.splice(activePinIdx, 1);
  closeModal();
}

// ======================================================
// LIGHTBOX
// ======================================================
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

// ======================================================
// UTIL
// ======================================================
let statusTimer = null;
function setStatus(msg, autoClear = 0) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.opacity = '1';
  if (statusTimer) clearTimeout(statusTimer);
  if (autoClear > 0) {
    statusTimer = setTimeout(() => { el.style.opacity = '0'; }, autoClear);
  }
}

// close modal on bg click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// DOM 構築完了後にアプリ起動
document.addEventListener('DOMContentLoaded', function() {
  startApp();
});


</script>
